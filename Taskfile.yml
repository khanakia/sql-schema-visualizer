version: '3'

# pnpm workspace monorepo:
#   packages/core   @sqlviz/core   (parser, layout, share — pure TS)
#   packages/react  @sqlviz/react  (composable components)
#   apps/web        the GitHub Pages app (bundles @sqlviz/* from source)

tasks:
  dev:
    desc: Start the web app dev server
    cmds:
      - pnpm --filter @sqlviz/web dev

  build:
    desc: Build the libraries then the web app
    cmds:
      - pnpm run build

  build:libs:
    desc: Build @sqlviz/core and @sqlviz/react (tsup ESM + d.ts)
    cmds:
      - pnpm run build:libs

  test:
    desc: Run unit tests (@sqlviz/core)
    cmds:
      - pnpm test

  typecheck:
    desc: Typecheck every package
    cmds:
      - pnpm -r typecheck

  preview:
    desc: Serve the production web build locally
    cmds:
      - pnpm --filter @sqlviz/web preview

  clean:
    desc: Remove build output and node_modules
    cmds:
      - rm -rf packages/*/dist apps/*/dist node_modules packages/*/node_modules apps/*/node_modules
