name: Publish to npm

# Auto-publishes the libraries whenever a GitHub Release is published
# (cut a release / tag like v0.1.1 → packages go to npm). Also runnable
# manually from the Actions tab.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json "packageManager"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @khanakia/sql-schema-core test
      - run: pnpm run build:libs
      # Publishes every non-private workspace package (the web app is
      # "private": true and is skipped). Skips versions already on npm.
      - run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
